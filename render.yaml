services:
  - type: web
    name: tradingmint-pro
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BROKER_MODE
        value: disabled
      - key: DB_PATH
        value: /var/data/tradingmint-db.json
      - key: SQLITE_PATH
        value: /var/data/tradingmint.sqlite
      - key: SCAN_LIMIT
        value: "90"
      - key: HISTORICAL_RANGE
        value: max
      - key: ADMIN_TOKEN
        generateValue: true
    disk:
      name: tradingmint-data
      mountPath: /var/data
      sizeGB: 1
